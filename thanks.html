    <title>お問い合わせありがとうございました | LIKaNON</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+JP:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <style>
        .thanks-section {
            padding: 10rem 0 6rem;
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-bg);
        }

        .thanks-inner {
            max-width: 640px;
            margin: 0 auto;
            text-align: center;
            padding: 0 var(--spacing-md);
        }

        .thanks-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto var(--spacing-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border-radius: 50%;
        }

        .thanks-title {
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: var(--spacing-lg);
            line-height: 1.5;
        }

        .thanks-message {
            font-size: 1rem;
            color: var(--color-text);
            line-height: 2;
            margin-bottom: var(--spacing-2xl);
        }

        .thanks-note {
            padding: var(--spacing-lg);
            background: var(--color-bg-soft);
            border-radius: var(--radius-md);
            text-align: left;
            font-size: 0.875rem;
            color: var(--color-text-light);
            line-height: 1.8;
            margin-bottom: var(--spacing-2xl);
        }

        .thanks-note strong {
            color: var(--color-primary);
        }

        .thanks-note a {
            color: var(--color-primary);
            text-decoration: underline;
            font-weight: 600;
        }

        .thanks-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: var(--spacing-md);
        }

        @media (max-width: 768px) {
            .thanks-section {
                padding: 8rem 0 4rem;
            }

            .thanks-icon {
                width: 64px;
                height: 64px;
            }

            .thanks-icon svg {
                width: 36px;
                height: 36px;
            }

            .thanks-actions {
                flex-direction: column;
            }

            .thanks-actions .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- ヘッダー -->
    <header class="header">
        <div class="header-inner">
            <a href="/" class="logo">
                <img src="img/likanonlogo.png" alt="LIKaNON" class="logo-image">
            </a>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="/#service">サービス</a></li>
                    <li><a href="/#portfolio">実績</a></li>
                    <li><a href="/#merit">選ばれる理由</a></li>
                    <li><a href="/blog.html">ブログ</a></li>
                    <li><a href="/#contact" class="nav-cta">お問い合わせ</a></li>
                </ul>
            </nav>
            <button class="hamburger" aria-label="メニュー">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <section class="thanks-section">
        <div class="thanks-inner">
            <div class="thanks-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>

            <h1 class="thanks-title">お問い合わせいただき<br>ありがとうございました</h1>

            <p class="thanks-message">
                お送りいただいた内容を確認のうえ、<br class="sp-only">
                通常24時間以内にご返信いたします。<br>
                今しばらくお待ちください。
            </p>

            <div class="thanks-note">
                <p>
                    <strong>ご注意：</strong>メールが2〜3日経っても届かない場合は、
                    迷惑メールフォルダに振り分けられている可能性がございます。
                    お手数ですがフォルダをご確認いただくか、
                    <a href="https://lin.ee/43NTiCQ" target="_blank" rel="noopener">LINE</a>
                    より再度ご連絡いただけますと幸いです。
                </p>
            </div>

            <div class="thanks-actions">
                <a href="/" class="btn btn-outline">
                    トップページへ戻る
                </a>
                <a href="/blog.html" class="btn btn-primary">
                    ブログを見る
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </a>
            </div>
        </div>
    </section>

    <!-- フッター -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 LIKaNON. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js" defer></script>
</body>
</html>
